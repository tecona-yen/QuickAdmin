<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/styles.css"><title>QuickAdmin Login</title></head>
<body class="login-body"><main class="card"><h1>QuickAdmin</h1><p>Enter server password.</p><input id="password" type="password" placeholder="Password" autofocus><button id="loginBtn">Login</button><p id="msg"></p></main>
<script>
loginBtn.onclick=async()=>{msg.textContent='';const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:password.value})});
if(!r.ok){msg.textContent=(await r.json()).error||'Login failed';return;}location.href='/index.html';};
password.addEventListener('keydown',e=>{if(e.key==='Enter')loginBtn.click();});
</script></body></html>
